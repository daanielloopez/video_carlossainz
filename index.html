<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MADRING · Gran Premio de España 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#032230;
    --navy-deep:#021820;
    --gold:#BAA072;
    --gold-soft:#d4c096;
    --paper:#f4f1ea;
    --mist:rgba(244,241,234,.62);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:radial-gradient(120% 90% at 50% 0%, var(--navy) 0%, var(--navy-deep) 70%);
    color:var(--paper);
    font-family:"Barlow",system-ui,sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:32px 20px;
    -webkit-font-smoothing:antialiased;
  }

  /* Title */
  .title{
    font-family:"Barlow Condensed",sans-serif;
    font-weight:700;
    letter-spacing:.14em;
    text-transform:uppercase;
    text-align:center;
    line-height:1.04;
    font-size:clamp(22px,4.2vw,40px);
    color:var(--paper);
    margin-bottom:30px;
  }
  .title br{display:block}

  /* Video stage */
  .stage{
    width:min(100%,920px);
    aspect-ratio:16/9;
    position:relative;
    border-radius:14px;
    overflow:hidden;
    background:#000;
    box-shadow:0 30px 80px -30px rgba(0,0,0,.8),
               0 0 0 1px rgba(186,160,114,.22);
  }
  video{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  /* Custom play overlay */
  .overlay{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    background:linear-gradient(180deg,rgba(3,34,48,.15),rgba(2,24,32,.55));
    transition:opacity .4s ease;
  }
  .overlay.hide{opacity:0;pointer-events:none}
  .play-btn{
    width:clamp(72px,10vw,92px);
    height:clamp(72px,10vw,92px);
    border-radius:50%;
    background:var(--gold);
    display:flex;
    align-items:center;
    justify-content:center;
    transition:transform .25s ease, background .25s ease;
    box-shadow:0 12px 40px -8px rgba(186,160,114,.6);
  }
  .overlay:hover .play-btn{transform:scale(1.07);background:var(--gold-soft)}
  .play-btn svg{width:36%;height:36%;margin-left:8%;fill:var(--navy-deep)}
  .play-label{
    position:absolute;
    bottom:22px;
    font-family:"Barlow Condensed",sans-serif;
    font-weight:600;
    letter-spacing:.16em;
    text-transform:uppercase;
    font-size:13px;
    color:var(--paper);
  }

  /* Footer line */
  .footer{
    margin-top:26px;
    font-family:"Barlow Condensed",sans-serif;
    font-weight:500;
    letter-spacing:.18em;
    text-transform:uppercase;
    font-size:clamp(11px,1.5vw,13px);
    color:var(--mist);
    text-align:center;
  }
  .footer a{color:var(--gold);text-decoration:none;border-bottom:1px solid rgba(186,160,114,.4);padding-bottom:1px}
  .footer a:hover{color:var(--gold-soft)}

  :focus-visible{outline:2px solid var(--gold);outline-offset:4px}
  @media (prefers-reduced-motion:reduce){
    .overlay,.play-btn{transition:none}
  }
  @media (max-width:520px){
    .title{letter-spacing:.1em}
  }
</style>
</head>
<body>

  <h1 class="title">Formula 1 TAG Heuer<br>Gran Premio de España</h1>

  <div class="stage">
    <video id="vid"
           playsinline
           preload="metadata"
           poster="POSTER_CARLOS.png">
      <source src="VIDEO_CARLOS.mp4" type="video/mp4">
      Tu navegador no admite la reproducción de vídeo.
    </video>

    <div class="overlay" id="overlay" role="button" tabindex="0" aria-label="Reproducir vídeo">
      <div class="play-btn">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
      </div>
      <span class="play-label">Reproducir</span>
    </div>
  </div>

  <div class="footer">
    11 – 13 Septiembre 2026 &nbsp;·&nbsp; <a href="https://hospitality.madring.com">Official Hospitality</a>
  </div>

<script>
  (function(){
    var vid = document.getElementById('vid');
    var overlay = document.getElementById('overlay');
    function start(){
      overlay.classList.add('hide');
      vid.setAttribute('controls','');
      vid.play();
    }
    overlay.addEventListener('click', start);
    overlay.addEventListener('keydown', function(e){
      if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); start(); }
    });
    vid.addEventListener('ended', function(){
      vid.removeAttribute('controls');
      overlay.classList.remove('hide');
    });
  })();
</script>
</body>
</html>
